name: Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Version to publish (e.g. 0.0.1)"
        required: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate Release Version
        run: |
          if [[ ! "${{ inputs.releaseVersion }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid releaseVersion: '${{ inputs.releaseVersion }}'. Expected semver, e.g. 0.0.1 or 0.0.1-rc1."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Tag Does Not Exist
        run: |
          if git rev-parse "v${{ inputs.releaseVersion }}" >/dev/null 2>&1; then
            echo "Tag v${{ inputs.releaseVersion }} already exists. Pick a new version."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Maven Unit Tests and Install Core
        run: mvn install -pl asyncapi-generator-core,asyncapi-generator-cli,asyncapi-generator-maven-plugin -am --batch-mode -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Run Gradle Plugin Tests
        working-directory: asyncapi-generator-gradle-plugin
        run: ./gradlew test -PasyncApiGeneratorVersion=1.0-SNAPSHOT

      - name: Set Release Version
        run: |
          # 1. Update Maven versions
          mvn -B \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -Dorg.slf4j.simpleLogger.log.org.jetbrains.dokka=warn \
            org.codehaus.mojo:versions-maven-plugin:2.16.2:set \
            -DnewVersion=${{ inputs.releaseVersion }} \
            -DgenerateBackupPoms=false
          
          echo "Verified versions:"
          grep "<version>" pom.xml | head -n 1

      - name: Build and Publish
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          # Pass GPG secrets for Gradle signing
          OSSRH_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          OSSRH_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # -P release activates the profile with GPG signing and central-publishing
          # -DskipTests speeds up the release if CI/Build workflow already verified it
          mvn -B \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -Dorg.slf4j.simpleLogger.log.org.jetbrains.dokka=warn \
            clean \
            deploy \
            -P release \
            -DskipTests \
            -Dinvoker.skip=true

      - name: Publish Gradle Plugin
        working-directory: asyncapi-generator-gradle-plugin
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          OSSRH_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          OSSRH_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          ./gradlew \
            -PasyncApiGeneratorVersion=${{ inputs.releaseVersion }} \
            -Pgradle.publish.key=$GRADLE_PUBLISH_KEY \
            -Pgradle.publish.secret=$GRADLE_PUBLISH_SECRET \
            publishPlugins \
            publishToSonatype \
            closeAndReleaseSonatypeStagingRepository
